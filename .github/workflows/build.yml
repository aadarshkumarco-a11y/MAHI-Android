name: Build MAHI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Generate debug keystore for release signing
      run: |
        keytool -genkeypair \
          -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -storepass android \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=MAHI, OU=Dev, O=MAHI, L=Delhi, ST=Delhi, C=IN"
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Release APK (signed with debug key)
      run: ./gradlew assembleRelease --no-daemon --stacktrace
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MAHI-APK
        path: app/build/outputs/apk/release/*.apk
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MAHI-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create GitHub Release with APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.1.0-build${{ github.run_number }}
        name: MAHI v2.1.0 Build #${{ github.run_number }}
        body: |
          🤖 MAHI AI Assistant - Latest Build
          
          **Build:** #${{ github.run_number }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}
          
          ### Download
          - Download the APK from the artifacts below, or from the assets attached to this release.
          
          ### Install
          1. Download the `.apk` file
          2. Enable "Install from unknown sources" in your phone settings
          3. Open the downloaded APK and tap Install
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
